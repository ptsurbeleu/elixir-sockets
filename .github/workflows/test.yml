name: "Test"
on: ["push"]

env:
  MIX_ENV: test

jobs:
  test:
    runs-on: ubuntu-latest
    name: OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    strategy:
      matrix:
        otp: ["28.x"]
        elixir: ["1.20.1"]

    steps:
      # GitHub does not evaluate expressions in job names for skipped jobs — the raw template
      # string renders verbatim instead. Running the job always (with remaining steps gated on
      # this check) is the only way to get the matrix-interpolated name to render correctly.
      - name: Check for open PR
        id: pr_check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/pulls \
            --jq "[.[] | select(.head.ref == \"${{ github.ref_name }}\" and .state == \"open\")] | length")
          echo "is_pr=$([ "$COUNT" -gt "0" ] && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Checkout code
        if: steps.pr_check.outputs.is_pr == 'false'
        uses: actions/checkout@v4

      - name: Set up Elixir
        if: steps.pr_check.outputs.is_pr == 'false'
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Check formatting
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make check-formatted

      - name: Run Credo
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make lint

      - name: Compile (warnings as errors)
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make compile

      - name: Run tests
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make test

      - name: Restore PLT cache (Dialyzer)
        if: steps.pr_check.outputs.is_pr == 'false'
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: _build/dev
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Build PLTs (Dialyzer)
        if: steps.pr_check.outputs.is_pr == 'false' && steps.plt-cache.outputs.cache-hit != 'true'
        run: make build-plt

      - name: Run Dialyzer
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make dialyzer

      - name: Build docs
        if: steps.pr_check.outputs.is_pr == 'false'
        run: make docs
