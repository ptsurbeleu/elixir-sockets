name: "Test"
on: ["push"]

env:
  MIX_ENV: test

jobs:
  check_pr:
    runs-on: ubuntu-latest
    outputs:
      is_pr: ${{ steps.check.outputs.is_pr }}
    steps:
      - name: Check if branch has open PR
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(gh api repos/${{ github.repository }}/pulls \
            --jq "[.[] | select(.head.ref == \"${{ github.ref_name }}\" and .state == \"open\")] | length")
          echo "is_pr=$([ "$COUNT" -gt "0" ] && echo true || echo false)" >> $GITHUB_OUTPUT

  test:
    needs: check_pr
    if: needs.check_pr.outputs.is_pr == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        otp: ["28.x"]
        elixir: ["1.20.1"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Check formatting
        run: make check-formatted

      - name: Run Credo
        run: make lint

      - name: Compile (warnings as errors)
        run: make compile

      - name: Run tests
        run: make test

      - name: Restore PLT cache (Dialyzer)
        uses: actions/cache@v4
        id: plt-cache
        with:
          path: _build/dev
          key: ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Build PLTs (Dialyzer)
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: make build-plt

      - name: Run Dialyzer
        run: make dialyzer

      - name: Build docs
        run: make docs
